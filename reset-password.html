<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Ink.CMS</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }

  .auth-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 900px;
    max-width: 95vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.4s ease;
  }

  .auth-side {
    background: var(--ink);
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .auth-side::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.15;
  }

  .auth-brand {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }
  .auth-brand span { color: var(--accent); }

  .auth-tagline {
    font-size: 28px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
  }

  .auth-note {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
  }

  .auth-form { padding: 60px 48px; }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .auth-sub a { color: var(--accent); text-decoration: none; font-weight: 600; }

  .pass-wrap { position: relative; }
  .pass-toggle {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    background: none;
    border: none;
    padding: 0;
  }

  .msg-success {
    margin-top: 16px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    background: rgba(45,106,79,0.08);
    color: var(--accent2);
  }

  .msg-error {
    margin-top: 16px;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    background: rgba(232,83,58,0.08);
    color: var(--accent);
  }

  @media (max-width: 600px) {
    .auth-wrap { grid-template-columns: 1fr; }
    .auth-side { display: none; }
    .auth-form { padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-side">
    <div class="auth-brand">Ink<span>.</span>CMS</div>
    <div class="auth-tagline">"Set a new password and get back to writing."</div>
    <div class="auth-note">Full-stack CMS · Node.js + MySQL</div>
  </div>

  <div class="auth-form">
    <div class="auth-title">Reset Password</div>
    <div class="auth-sub">Enter your new password below. <a href="login.html">Back to login</a></div>

    <div class="form-group">
      <label class="form-label">New password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="new-password" placeholder="Min 6 characters" style="padding-right:44px">
        <button class="pass-toggle" onclick="togglePass('new-password', this)">Show</button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter your password" style="padding-right:44px">
        <button class="pass-toggle" onclick="togglePass('confirm-password', this)">Show</button>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="resetPassword()">
      Reset Password
    </button>

    <div id="msg" style="display:none"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showMsg('No reset token found. Please use the link from your email.', 'error');
    document.querySelector('.btn-primary').disabled = true;
  }

  function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
  }

  async function resetPassword() {
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;

    if (!password || !confirm) { showMsg('Please fill all fields.', 'error'); return; }
    if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }
    if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

    try {
      const data = await apiCall('/reset-password', 'POST', { token, password });
      showMsg(data.message, 'success');
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    } catch (err) {
      showMsg(err.message, 'error');
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = type === 'success' ? 'msg-success' : 'msg-error';
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
</script>
</body>
</html>
