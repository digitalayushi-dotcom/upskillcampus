<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Ink.CMS</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }

  .auth-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 900px;
    max-width: 95vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.4s ease;
  }

  .auth-side {
    background: var(--ink);
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .auth-side::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.15;
  }

  .auth-brand {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }
  .auth-brand span { color: var(--accent); }

  .auth-tagline {
    font-size: 28px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
  }

  .auth-note {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
  }

  .auth-form { padding: 60px 48px; }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .auth-sub a { color: var(--accent); text-decoration: none; font-weight: 600; }

  .pass-wrap { position: relative; }
  .pass-toggle {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    background: none;
    border: none;
    padding: 0;
  }

  @media (max-width: 600px) {
    .auth-wrap { grid-template-columns: 1fr; }
    .auth-side { display: none; }
    .auth-form { padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-side">
    <div class="auth-brand">Ink<span>.</span>CMS</div>
    <div class="auth-tagline">"Welcome back. Your readers are waiting."</div>
    <div class="auth-note">Full-stack CMS · Node.js + MySQL</div>
  </div>

  <div class="auth-form">
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">No account? <a href="register.html">Create one free</a></div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="password" placeholder="Your password" style="padding-right:44px">
        <button class="pass-toggle" onclick="togglePass('password', this)">Show</button>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="login()">
      Sign In
    </button>

    <a href="#" onclick="toggleForgot(event)" style="display:inline-block;margin-top:12px;font-size:13px;color:var(--muted);text-decoration:none">Forgot password?</a>

    <div id="forgot-form" style="display:none;margin-top:16px">
      <label class="form-label">Enter your email</label>
      <input class="form-input" type="email" id="reset-email" placeholder="you@example.com">
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:10px" onclick="forgotPassword()">
        Send Reset Link
      </button>
      <div id="forgot-msg" style="display:none;margin-top:12px;font-size:13px;padding:10px 14px;border-radius:6px"></div>
    </div>

    <div id="error-msg" style="display:none;margin-top:16px;color:var(--accent);font-size:13px;padding:10px 14px;background:rgba(232,83,58,0.08);border-radius:6px"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (isLoggedIn()) window.location.href = 'blogs.html';

  function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
  }

  function toggleForgot(e) {
    e.preventDefault();
    const form = document.getElementById('forgot-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function forgotPassword() {
    const email = document.getElementById('reset-email').value.trim();
    const msgEl = document.getElementById('forgot-msg');
    if (!email) {
      msgEl.textContent = 'Please enter your email';
      msgEl.style.display = 'block';
      msgEl.style.background = 'rgba(232,83,58,0.08)';
      msgEl.style.color = 'var(--accent)';
      return;
    }
    try {
      const data = await apiCall('/forgot-password', 'POST', { email });
      msgEl.textContent = data.message;
      msgEl.style.display = 'block';
      msgEl.style.background = 'rgba(45,106,79,0.08)';
      msgEl.style.color = 'var(--accent2)';
    } catch (err) {
      msgEl.textContent = err.message;
      msgEl.style.display = 'block';
      msgEl.style.background = 'rgba(232,83,58,0.08)';
      msgEl.style.color = 'var(--accent)';
    }
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showError('Please fill all fields'); return; }

    try {
      const data = await apiCall('/login', 'POST', { email, password });
      localStorage.setItem('cms_token', data.token);
      localStorage.setItem('cms_user', JSON.stringify(data.user));
      window.location.href = 'blogs.html';
    } catch (err) {
      showError(err.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
