<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Posts — Ink.CMS</title>
<link rel="stylesheet" href="style.css">
<style>
  .hero {
    padding: 80px 60px 60px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .hero-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 480px;
  }

  .posts-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .post-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* Featured post */
  .post-featured {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 32px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .post-featured:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

  .post-featured-img {
    background: var(--ink);
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 80px;
    position: relative;
    overflow: hidden;
  }

  .post-featured-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
    opacity: 0.2;
  }

  .post-featured-body { padding: 48px; display: flex; flex-direction: column; justify-content: center; }

  .post-tag {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(232,83,58,0.1);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 16px;
    width: fit-content;
  }

  .post-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .post-excerpt {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .post-author-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  /* Grid posts */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .post-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .post-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }

  .post-card-top {
    background: var(--ink);
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    position: relative;
    overflow: hidden;
  }

  .post-card-top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent2) 0%, transparent 70%);
    opacity: 0.2;
  }

  .post-card-body { padding: 24px; }
  .post-card-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.35;
    letter-spacing: -0.3px;
  }

  .post-card-excerpt {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
  }

  .empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
  }

  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .empty-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,24,20,0.6);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: 720px;
    max-width: 100%;
    animation: fadeUp 0.3s ease;
    overflow: hidden;
  }

  .modal-header {
    background: var(--ink);
    padding: 48px;
    position: relative;
    overflow: hidden;
  }

  .modal-header::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.1;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
    position: relative;
    z-index: 1;
    letter-spacing: -1px;
  }

  .modal-meta {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    font-family: 'DM Mono', monospace;
    margin-top: 12px;
    position: relative;
    z-index: 1;
  }

  .modal-body { padding: 48px; }

  .modal-content {
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
  }

  .modal-content h1, .modal-content h2, .modal-content h3 {
    font-family: 'Playfair Display', serif;
    margin: 24px 0 12px;
    letter-spacing: -0.5px;
  }

  .modal-content p { margin-bottom: 16px; }
  .modal-content ul, .modal-content ol { padding-left: 24px; margin-bottom: 16px; }
  .modal-content li { margin-bottom: 6px; }
  .modal-content strong { font-weight: 600; }
  .modal-content a { color: var(--accent); }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.15s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.2); }

  @media (max-width: 700px) {
    .post-featured { grid-template-columns: 1fr; }
    .post-featured-img { min-height: 160px; }
    .posts-section { padding: 40px 20px; }
    .hero { padding: 80px 24px 48px; }
  }
</style>
</head>
<body>

<nav class="nav" id="nav"></nav>

<div class="page">
  <div class="hero fade-up">
    <div class="hero-label">✦ Published Stories</div>
    <div class="hero-title">All Posts</div>
    <div class="hero-sub">Read, explore, and get inspired by stories from our writers.</div>
  </div>

  <div class="posts-section">
    <div class="section-header">
      <div class="section-title">✦ Latest</div>
      <div class="post-count" id="post-count">Loading...</div>
    </div>
    <div id="featured-post"></div>
    <div class="posts-grid" id="posts-grid">
      <!-- posts render here -->
    </div>
  </div>
</div>

<!-- Read Post Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body">
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  renderNav('blogs');

  const EMOJIS = ['📝', '✍️', '📖', '🌟', '💡', '🎨', '🚀', '🌿', '💬', '🔥'];
  let posts = [];

  async function loadPosts() {
    try {
      posts = await apiCall('/posts');
      renderPosts();
    } catch (err) {
      document.getElementById('post-count').textContent = 'Error loading posts';
      document.getElementById('posts-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">Couldn't load posts</div>
          <div class="empty-sub">Make sure your server is running on port 5001</div>
        </div>
      `;
    }
  }

  function timeAgo(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function excerpt(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    return div.textContent.slice(0, 180) + '...';
  }

  function authorInitials(email) {
    return email ? email[0].toUpperCase() : 'A';
  }

  function authorName(email) {
    return email && email.includes('@') ? email.split('@')[0] : 'Anonymous';
  }

  function renderPosts() {
    const count = posts.length;
    document.getElementById('post-count').textContent = `${count} post${count !== 1 ? 's' : ''}`;

    if (count === 0) {
      document.getElementById('featured-post').innerHTML = '';
      document.getElementById('posts-grid').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✍️</div>
          <div class="empty-title">No posts yet</div>
          <div class="empty-sub">Be the first to publish a story.</div>
          ${isLoggedIn() ? `<a class="btn btn-primary" href="editor.html">Write your first post</a>` : `<a class="btn btn-primary" href="register.html">Get started free</a>`}
        </div>
      `;
      return;
    }

    // Featured (first post)
    const first = posts[0];
    document.getElementById('featured-post').innerHTML = `
      <div class="post-featured" onclick="openPost(0)">
        <div class="post-featured-img">${EMOJIS[0]}</div>
        <div class="post-featured-body">
          <div class="post-tag">✦ Featured</div>
          <div class="post-title">${first.title}</div>
          <div class="post-excerpt">${excerpt(first.content)}</div>
          <div class="post-meta">
            <div class="post-author-dot">${authorInitials(first.author_email)}</div>
            <span>${authorName(first.author_email)}</span>
            <span>·</span>
            <span>${timeAgo(first.created_at)}</span>
          </div>
        </div>
      </div>
    `;

    // Rest of posts
    const rest = posts.slice(1);
    if (rest.length === 0) {
      document.getElementById('posts-grid').innerHTML = '';
      return;
    }

    document.getElementById('posts-grid').innerHTML = rest.map((p, i) => `
      <div class="post-card fade-up" style="animation-delay:${i * 0.07}s" onclick="openPost(${i + 1})">
        <div class="post-card-top">${EMOJIS[(i + 1) % EMOJIS.length]}</div>
        <div class="post-card-body">
          <div class="post-card-title">${p.title}</div>
          <div class="post-card-excerpt">${excerpt(p.content)}</div>
          <div class="post-meta">
            <div class="post-author-dot">${authorInitials(p.author_email)}</div>
            <span>${authorName(p.author_email)}</span>
            <span>·</span>
            <span>${timeAgo(p.created_at)}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openPost(index) {
    const p = posts[index];
    document.getElementById('modal-title').textContent = p.title;
    document.getElementById('modal-meta').textContent =
      `By ${authorName(p.author_email)} · ${new Date(p.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
    document.getElementById('modal-content').innerHTML = p.content;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadPosts();
</script>
</body>
</html>
