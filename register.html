<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Ink.CMS</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }

  .auth-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 900px;
    max-width: 95vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: fadeUp 0.4s ease;
  }

  .auth-side {
    background: var(--ink);
    padding: 60px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .auth-side::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.12;
  }

  .auth-side::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.15;
  }

  .auth-brand {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
  }
  .auth-brand span { color: var(--accent); }

  .auth-tagline {
    font-size: 28px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
    position: relative;
    z-index: 1;
  }

  .auth-note {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-family: 'DM Mono', monospace;
    position: relative;
    z-index: 1;
  }

  .auth-form { padding: 60px 48px; }

  .auth-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .auth-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .auth-sub a { color: var(--accent); text-decoration: none; font-weight: 600; }

  .pass-wrap { position: relative; }
  .pass-toggle {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    background: none;
    border: none;
    padding: 0;
  }

  @media (max-width: 600px) {
    .auth-wrap { grid-template-columns: 1fr; }
    .auth-side { display: none; }
    .auth-form { padding: 40px 28px; }
  }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-side">
    <div class="auth-brand">Ink<span>.</span>CMS</div>
    <div class="auth-tagline">"Your stories deserve a beautiful home."</div>
    <div class="auth-note">Full-stack CMS · Node.js + MySQL</div>
  </div>

  <div class="auth-form">
    <div class="auth-title">Create account</div>
    <div class="auth-sub">Already have one? <a href="login.html">Sign in</a></div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pass-wrap">
        <input class="form-input" type="password" id="password" placeholder="Min. 6 characters" style="padding-right:44px">
        <button class="pass-toggle" onclick="togglePass('password', this)">Show</button>
      </div>
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:14px" onclick="register()">
      Create Account
    </button>

    <div id="error-msg" style="display:none;margin-top:16px;color:var(--accent);font-size:13px;padding:10px 14px;background:rgba(232,83,58,0.08);border-radius:6px"></div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (isLoggedIn()) window.location.href = 'blogs.html';

  function togglePass(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'Show' : 'Hide';
  }

  async function register() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!email || !password) { showError('Please fill all fields'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters'); return; }

    try {
      const data = await apiCall('/register', 'POST', { email, password });
      localStorage.setItem('cms_token', data.token);
      localStorage.setItem('cms_user', JSON.stringify(data.user));
      window.location.href = 'blogs.html';
    } catch (err) {
      showError(err.message);
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
